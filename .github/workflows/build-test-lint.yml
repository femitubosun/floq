name: Build and Lint
on:
  push:
    branches: [dev**]
    paths-ignore:
      - '**.md'
      - .vscode/**
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
      - dev
    paths-ignore:
      - '**.md'
      - .vscode/**

jobs:
  test:
    timeout-minutes: 30
    if: ${{ github.actor != 'dependabot[bot]' }}
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v4
        with:
          version: 7.26.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18.x
          cache: 'npm'

      - name: Install deps
        run: npm install

      - name: Run build
        run: npm run build

      - name: Run lint
        run: npm run lint
        continue-on-error: true

      - name: Run test
        run: npm run test

